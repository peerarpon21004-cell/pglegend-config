<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>PGLEGEND — Server Migration</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, "SF Pro Text", "Sukhumvit Set", sans-serif;
      background: linear-gradient(180deg, #0a1f3a 0%, #1a0a3a 100%);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }
    .badge {
      font-size: 12px;
      letter-spacing: 2px;
      color: #00d4ff;
      margin-bottom: 8px;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 16px;
      animation: spin 4s linear infinite;
    }
    @keyframes spin { from { transform: rotate(0); } to { transform: rotate(360deg); } }
    h1 {
      font-size: 26px;
      font-weight: 800;
      background: linear-gradient(180deg, #00d4ff, #4d8aff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0 0 10px 0;
    }
    p {
      max-width: 380px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.85);
      margin: 8px 0;
    }
    .progress {
      width: 200px;
      height: 4px;
      background: rgba(255,255,255,.15);
      border-radius: 2px;
      margin: 28px auto 0;
      overflow: hidden;
    }
    .progress::after {
      content: '';
      display: block;
      height: 100%;
      width: 30%;
      background: linear-gradient(90deg, #00d4ff, #4d8aff);
      animation: slide 1.8s ease-in-out infinite;
    }
    @keyframes slide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }
    .footer {
      margin-top: 36px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.4);
    }
  </style>
</head>
<body>
  <div class="badge">VERSION 2 PAGE</div>
  <div class="icon">⚙️</div>
  <h1>กำลังย้ายเซิร์ฟเวอร์</h1>
  <p>Server migration in progress.<br>
  อีกประมาณ 30 นาทีกลับมาเล่นได้ครับ<br>
  Please come back in ~30 minutes.</p>
  <div class="progress"></div>
  <div class="footer">URL switched from "maintenance.html" → "maintenance-v2.html"<br>without rebuilding the app ✓</div>
</body>
</html>
