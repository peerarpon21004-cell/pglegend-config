<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>PGLEGEND — Maintenance</title>
  <style>
    :root {
      color-scheme: dark;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, "SF Pro Text", Roboto, sans-serif;
      background: linear-gradient(180deg, #0d0d24 0%, #1a0a3a 100%);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
      overflow-x: hidden;
    }
    .icon {
      font-size: 72px;
      margin-bottom: 24px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.85; }
    }
    h1 {
      font-size: 28px;
      font-weight: 800;
      margin: 0 0 12px 0;
      letter-spacing: 1px;
      background: linear-gradient(180deg, #ffd54f, #ff9800);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    h2 {
      font-size: 18px;
      font-weight: 500;
      margin: 0 0 24px 0;
      color: rgba(255, 255, 255, 0.8);
    }
    p {
      max-width: 380px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.75);
      margin: 0 0 16px 0;
    }
    .footer {
      margin-top: 32px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.4);
    }
  </style>
</head>
<body>
  <div class="icon">🛡️</div>
  <h1>PGLEGEND</h1>
  <h2>ปิดปรับปรุงระบบ</h2>
  <p>เกมกำลังอัปเดต โปรดกลับมาในอีกสักครู่<br>
  We're upgrading the game — please check back soon.</p>
  <p>หากมีคำถามติดต่อ: <strong>your-email@example.com</strong></p>
  <div class="footer">PGLEGEND © 2026</div>
</body>
</html>
